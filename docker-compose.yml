services:
  postgres:
    image: postgres:16-alpine
    container_name: shopping-cms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-shopping_cms}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-strapi} -d ${DATABASE_NAME:-shopping_cms}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
